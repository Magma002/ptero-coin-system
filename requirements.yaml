packages:
  "framer-motion": "For smooth transitions and micro-interactions"
  "canvas-confetti": "For coin reward celebration effects"
  "@types/canvas-confetti": "Types for canvas-confetti"
  "lucide-react": "For UI icons"
  "clsx": "For conditional class names"
  "tailwind-merge": "For conditional class names"
  "date-fns": "For formatting dates in history table"

images:
  - path: "artifacts/coinreward/public/images/auth-bg.png"
    description: "Dark neon abstract mesh gradient background with deep navy, glowing purple, and cyan hues"
    aspect_ratio: "16:9"
  - path: "artifacts/coinreward/public/images/avatar.png"
    description: "3D stylized futuristic cyberpunk avatar illustration, head and shoulders, deep neon lighting"
    aspect_ratio: "1:1"

notes:
  - "App uses JWT stored in localStorage ('coinreward_token')"
  - "API uses standard Bearer token authorization"
  - "Custom fetch hooks are used to easily inject the token"
