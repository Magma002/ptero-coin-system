<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExoClick Zone Test</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #1a1a1a; 
            color: white; 
            text-align: center;
        }
        .status { 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px; 
            font-weight: bold;
        }
        .success { background: #2ecc71; color: white; }
        .error { background: #e74c3c; color: white; }
        .warning { background: #f39c12; color: white; }
        .ad-container {
            background: #333;
            padding: 20px;
            margin: 20px auto;
            border-radius: 8px;
            max-width: 800px;
            min-height: 200px;
            border: 2px solid #e74c3c;
        }
    </style>
</head>
<body>
    <h1>🎬 ExoClick Zone 5877266 Test</h1>
    <div id="status">Testing...</div>
    
    <div class="ad-container">
        <ins class="eas6a97888e37" data-zoneid="5877266"></ins>
    </div>
    
    <div id="details"></div>

    <script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script>
    <script>
        let statusDiv = document.getElementById('status');
        let detailsDiv = document.getElementById('details');
        
        function updateStatus(message, type = 'warning') {
            statusDiv.innerHTML = message;
            statusDiv.className = 'status ' + type;
            console.log(message);
        }
        
        function addDetail(message) {
            detailsDiv.innerHTML += '<div style="margin: 5px 0; font-size: 14px;">' + message + '</div>';
            console.log(message);
        }
        
        // Test script loading
        setTimeout(() => {
            if (typeof AdProvider !== 'undefined') {
                updateStatus('✅ ExoClick script loaded successfully', 'success');
                addDetail('AdProvider is available');
                
                // Trigger the ad
                try {
                    (AdProvider = window.AdProvider || []).push({"serve": {}});
                    addDetail('✅ AdProvider.push() executed');
                    
                    // Check if ad loaded after delay
                    setTimeout(() => {
                        const adElement = document.querySelector('.eas6a97888e37');
                        if (adElement && adElement.innerHTML.trim() !== '') {
                            updateStatus('✅ Ad loaded successfully!', 'success');
                            addDetail('Ad content detected in element');
                        } else {
                            updateStatus('⚠️ Ad element empty - Zone might be inactive', 'warning');
                            addDetail('Zone 5877266 might not be configured or active');
                            addDetail('Check your ExoClick dashboard');
                        }
                    }, 3000);
                    
                } catch (error) {
                    updateStatus('❌ Error triggering ad: ' + error.message, 'error');
                    addDetail('AdProvider.push() failed');
                }
                
            } else {
                updateStatus('❌ ExoClick script failed to load', 'error');
                addDetail('AdProvider is not available');
                addDetail('Possible causes: Network issues, ad blockers, CORS');
            }
        }, 2000);
        
        // Test network connectivity
        fetch('https://a.magsrv.com/ad-provider.js', { method: 'HEAD' })
            .then(response => {
                addDetail('✅ ExoClick server reachable (Status: ' + response.status + ')');
            })
            .catch(error => {
                addDetail('❌ Cannot reach ExoClick server: ' + error.message);
            });
    </script>
</body>
</html>
