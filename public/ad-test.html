<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Delegate-CH" content="Sec-CH-UA https://s.magsrv.com; Sec-CH-UA-Mobile https://s.magsrv.com; Sec-CH-UA-Arch https://s.magsrv.com; Sec-CH-UA-Model https://s.magsrv.com; Sec-CH-UA-Platform https://s.magsrv.com; Sec-CH-UA-Platform-Version https://s.magsrv.com; Sec-CH-UA-Bitness https://s.magsrv.com; Sec-CH-UA-Full-Version-List https://s.magsrv.com; Sec-CH-UA-Full-Version https://s.magsrv.com;">
<title>CoinDrop — Earn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1c1c28;
    --border: #2a2a3d;
    --gold: #f5c842;
    --gold2: #ffdd77;
    --accent: #7c6af7;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #3ddc97;
    --danger: #ff5f6d;
    --glow: 0 0 30px rgba(245,200,66,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 0 32px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    color: var(--gold);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--text); }

  /* Coin balance */
  .balance-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .balance-card::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(245,200,66,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .balance-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .balance-amount {
    font-family: 'Syne', sans-serif;
    font-size: 3.2rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    transition: all 0.4s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .coin-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--gold), #c9960a);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    box-shadow: 0 2px 12px rgba(245,200,66,0.4);
    flex-shrink: 0;
  }

  .balance-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Earn Section */
  .section-title {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .earn-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .earn-card.active {
    border-color: rgba(245,200,66,0.35);
  }

  .earn-icon-wrap {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }

  .earn-info { flex: 1; }
  .earn-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 4px;
  }
  .earn-desc {
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .earn-reward {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 1rem;
    text-align: right;
    flex-shrink: 0;
  }
  .earn-reward small {
    display: block;
    font-size: 0.6rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-weight: 400;
  }

  /* EARN BUTTON */
  .btn-earn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #f5c842, #e6a800);
    color: #0a0a0f;
    border: none;
    border-radius: 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(245,200,66,0.3);
    position: relative;
    overflow: hidden;
    margin-top: 24px;
  }

  .btn-earn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(245,200,66,0.45);
  }

  .btn-earn:active { transform: translateY(0); }

  .btn-earn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    pointer-events: none;
  }

  /* AD OVERLAY */
  #ad-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #ad-overlay.visible { display: flex; }

  .ad-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 480px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .ad-top-bar {
    background: var(--card);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .ad-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .ad-timer {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .timer-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    position: relative;
  }

  .ad-video-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
  }

  .ad-video-wrap video,
  .ad-video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .ad-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.75rem;
    gap: 10px;
    background: #0a0a0f;
  }

  .ad-placeholder .play-icon {
    font-size: 3rem;
    color: var(--gold);
    opacity: 0.5;
  }

  .ad-bottom {
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .reward-preview {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .reward-preview strong {
    color: var(--gold);
    font-family: 'Syne', sans-serif;
  }

  .btn-skip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    cursor: not-allowed;
    opacity: 0.4;
    transition: all 0.3s;
  }

  .btn-skip.ready {
    cursor: pointer;
    opacity: 1;
    border-color: var(--success);
    color: var(--success);
  }

  /* Progress bar */
  .ad-progress {
    height: 3px;
    background: var(--border);
    width: 100%;
  }

  .ad-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    width: 0%;
    transition: width 1s linear;
  }

  /* REWARD TOAST */
  .reward-toast {
    display: none;
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--success);
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 14px 28px;
    border-radius: 50px;
    z-index: 2000;
    box-shadow: 0 8px 30px rgba(61,220,151,0.4);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  .reward-toast.show {
    display: block;
    transform: translateX(-50%) translateY(0);
  }

  /* Coin bounce animation */
  @keyframes coinBounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.4) rotate(-5deg); }
    60%  { transform: scale(0.9) rotate(5deg); }
    80%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .bounce { animation: coinBounce 0.6s ease-out; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .pulsing { animation: pulse 1.5s ease-in-out infinite; }

  /* History */
  .history-list {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.72rem;
    animation: slideIn 0.4s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .history-item .h-label { color: var(--muted); }
  .history-item .h-amount { color: var(--success); font-family: 'Syne', sans-serif; font-weight: 700; }
</style>
</head>
<body>

<div class="page">
  <header>
    <div class="logo">⬡<span>Coin</span>Drop</div>
    <div style="font-size:0.7rem;color:var(--muted);">v1.0</div>
  </header>

  <!-- Balance -->
  <div class="balance-card">
    <div class="balance-label">Total Balance</div>
    <div class="balance-amount" id="balance">
      <div class="coin-icon" id="coin-icon">🪙</div>
      <span id="balance-num">0</span>
    </div>
    <div class="balance-sub">COINS</div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="ads-watched">0</div>
      <div class="stat-label">Ads Watched</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="coins-today">0</div>
      <div class="stat-label">Earned Today</div>
    </div>
  </div>

  <!-- Earn Card -->
  <div class="section-title">Available Tasks</div>
  <div class="earn-card active">
    <div class="earn-icon-wrap">📺</div>
    <div class="earn-info">
      <div class="earn-title">Watch Video Ad</div>
      <div class="earn-desc">Watch a 30-second ad and earn coins instantly. Unlimited times per day.</div>
    </div>
    <div class="earn-reward">
      +1
      <small>COIN / AD</small>
    </div>
  </div>

  <button class="btn-earn" onclick="startAd()">
    ▶ &nbsp;EARN NOW
  </button>

  <!-- History -->
  <div class="section-title" style="margin-top:36px;" id="hist-title" style="display:none">Recent Earnings</div>
  <div class="history-list" id="history-list"></div>
</div>

<!-- AD OVERLAY -->
<div id="ad-overlay">
  <div class="ad-box">
    <div class="ad-top-bar">
      <div class="ad-label">📢 Sponsored Ad</div>
      <div class="ad-timer">
        <div class="timer-circle" id="timer-num">30</div>
        sec left
      </div>
    </div>
    <div class="ad-progress"><div class="ad-progress-fill" id="progress-fill"></div></div>

    <div class="ad-video-wrap">
      <!-- VAST Ad Player via video.js or iframe -->
      <div class="ad-placeholder" id="ad-placeholder">
        <div class="play-icon pulsing">▶</div>
        <div>Loading Ad...</div>
      </div>
      <div id="vast-container" style="position:absolute;inset:0;"></div>
    </div>

    <div class="ad-bottom">
      <div class="reward-preview">🪙 Reward: <strong>+1 Coin</strong> after watching</div>
      <button class="btn-skip" id="skip-btn" onclick="skipAd()">SKIP</button>
    </div>
  </div>
</div>

<!-- Reward toast -->
<div class="reward-toast" id="reward-toast">🎉 +1 Coin Earned!</div>

<script>
  let coins = 0;
  let adsWatched = 0;
  let timerInterval = null;
  let adSeconds = 30;

  function startAd() {
    // Reset
    adSeconds = 30;
    document.getElementById('timer-num').textContent = '30';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('skip-btn').classList.remove('ready');
    document.getElementById('ad-placeholder').style.display = 'flex';

    // Show overlay
    document.getElementById('ad-overlay').classList.add('visible');

    // Load VAST ad
    loadVastAd();

    // Start countdown
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      adSeconds--;
      document.getElementById('timer-num').textContent = adSeconds;
      const pct = ((30 - adSeconds) / 30) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';

      if (adSeconds <= 5) {
        document.getElementById('skip-btn').classList.add('ready');
        document.getElementById('skip-btn').textContent = adSeconds > 0 ? `CLAIM (${adSeconds})` : 'CLAIM';
      }

      if (adSeconds <= 0) {
        clearInterval(timerInterval);
        earnCoin();
      }
    }, 1000);
  }

  function loadVastAd() {
    const container = document.getElementById('vast-container');
    container.innerHTML = '';

    // Create video element
    const video = document.createElement('video');
    video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;background:#000;';
    video.controls = false;
    video.autoplay = true;
    video.muted = false;
    video.playsInline = true;

    container.appendChild(video);

    // Fetch VAST XML and parse
    const vastUrl = 'https://s.magsrv.com/v1/vast.php?idzone=5877274';

    fetch(vastUrl)
      .then(r => r.text())
      .then(xml => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xml, 'text/xml');

        // Try to get MediaFile URL
        const mediaFiles = doc.querySelectorAll('MediaFile');
        let videoUrl = null;

        mediaFiles.forEach(mf => {
          const type = mf.getAttribute('type') || '';
          if (!videoUrl && type.includes('mp4')) {
            videoUrl = mf.textContent.trim();
          }
        });

        if (!videoUrl && mediaFiles.length > 0) {
          videoUrl = mediaFiles[0].textContent.trim();
        }

        if (videoUrl) {
          video.src = videoUrl;
          video.play().catch(() => {
            // autoplay blocked - show placeholder with play button
            showManualPlay(video);
          });
          document.getElementById('ad-placeholder').style.display = 'none';
        } else {
          // Try clickthrough / redirect
          const vast2 = doc.querySelector('VASTAdTagURI');
          if (vast2) {
            // Wrapper VAST — try nested
            fetch(vast2.textContent.trim())
              .then(r2 => r2.text())
              .then(xml2 => parseVast2(xml2, video))
              .catch(() => showFallbackAd());
          } else {
            showFallbackAd();
          }
        }
      })
      .catch(() => {
        // CORS issue — use iframe approach
        showFallbackAd();
      });
  }

  function parseVast2(xml, video) {
    const doc = (new DOMParser()).parseFromString(xml, 'text/xml');
    const mediaFiles = doc.querySelectorAll('MediaFile');
    let videoUrl = null;
    mediaFiles.forEach(mf => {
      if (!videoUrl && (mf.getAttribute('type') || '').includes('mp4'))
        videoUrl = mf.textContent.trim();
    });
    if (!videoUrl && mediaFiles.length > 0) videoUrl = mediaFiles[0].textContent.trim();
    if (videoUrl) {
      video.src = videoUrl;
      video.play().catch(() => showManualPlay(video));
      document.getElementById('ad-placeholder').style.display = 'none';
    } else {
      showFallbackAd();
    }
  }

  function showManualPlay(video) {
    const ph = document.getElementById('ad-placeholder');
    ph.style.display = 'flex';
    ph.innerHTML = `
      <div style="font-size:3rem;cursor:pointer;" onclick="this.parentElement.style.display='none'; arguments[0].target.closest('#vast-container').querySelector('video').play();">▶</div>
      <div style="font-size:0.75rem;color:var(--muted)">Tap to play ad</div>
    `;
    // Re-attach click to play
    ph.querySelector('div').addEventListener('click', () => {
      video.play();
      ph.style.display = 'none';
    });
  }

  function showFallbackAd() {
    // Fallback: show a stylized placeholder that still counts down
    const ph = document.getElementById('ad-placeholder');
    ph.style.display = 'flex';
    ph.innerHTML = `
      <div style="font-size:2.5rem;">📺</div>
      <div style="font-size:0.8rem;color:var(--muted);text-align:center;max-width:220px;line-height:1.6">
        Ad is playing in background.<br>Please wait for the countdown.
      </div>
    `;
  }

  function skipAd() {
    const btn = document.getElementById('skip-btn');
    if (!btn.classList.contains('ready')) return;
    clearInterval(timerInterval);
    earnCoin();
  }

  function earnCoin() {
    // Close overlay
    document.getElementById('ad-overlay').classList.remove('visible');
    document.getElementById('vast-container').innerHTML = '';

    // Add coin
    coins += 1;
    adsWatched += 1;

    // Update UI
    const balNum = document.getElementById('balance-num');
    balNum.textContent = coins;

    const icon = document.getElementById('coin-icon');
    icon.classList.remove('bounce');
    void icon.offsetWidth;
    icon.classList.add('bounce');

    document.getElementById('ads-watched').textContent = adsWatched;
    document.getElementById('coins-today').textContent = coins;

    // Toast
    const toast = document.getElementById('reward-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);

    // History
    addHistory();
  }

  function addHistory() {
    const list = document.getElementById('history-list');
    const title = document.getElementById('hist-title');
    title.style.display = 'block';

    const now = new Date();
    const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="h-label">📺 Video Ad #${adsWatched} &nbsp;·&nbsp; ${time}</div>
      <div class="h-amount">+1 🪙</div>
    `;
    list.insertBefore(item, list.firstChild);
  }

  // Close overlay on background click
  document.getElementById('ad-overlay').addEventListener('click', function(e) {
    if (e.target === this) {
      // Don't allow closing by clicking outside
    }
  });
</script>
</body>
</html>
